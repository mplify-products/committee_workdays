<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mplify · Agentic LSO Architecture</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#ffffff;--bg2:#f8fafc;--bdr:rgba(0,0,0,0.10);--txt:#1e293b;--mut:#64748b}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:'Sora',sans-serif;display:flex;flex-direction:column}
#hdr{display:flex;align-items:center;gap:10px;padding:9px 18px;flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--bdr);flex-wrap:wrap}
#htitle{flex:1;text-align:center;min-width:160px}
#htitle h1{font-size:11.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;opacity:.85}
#hsub{font-size:9.5px;color:var(--mut);font-family:'DM Mono',monospace;margin-top:1px}
.btn{font-size:10px;font-family:'DM Mono',monospace;padding:4px 9px;border-radius:6px;border:1px solid var(--bdr);cursor:pointer;background:rgba(0,0,0,0.04);color:var(--mut);transition:.15s;white-space:nowrap}
.btn:hover{background:rgba(0,0,0,0.08);color:var(--txt)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite}
#fbar{display:flex;align-items:center;gap:6px;padding:5px 18px;flex-shrink:0;background:#f1f5f9;border-bottom:1px solid var(--bdr);overflow-x:auto;min-height:36px}
.flbl{font-size:8.5px;font-family:'DM Mono',monospace;color:var(--mut);text-transform:uppercase;letter-spacing:.09em;white-space:nowrap}
.sep{width:1px;height:16px;background:var(--bdr);flex-shrink:0}
#tbtns{display:flex;gap:4px;align-items:center}
.tbtn{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;border:1px solid transparent;font-size:9.5px;font-family:'DM Mono',monospace;cursor:pointer;transition:.15s;background:transparent;white-space:nowrap}
.tbtn.off{opacity:.2}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
select.fsel{font-size:9.5px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:6px;border:1px solid var(--bdr);background:#fff;color:var(--mut);cursor:pointer;outline:none}
select.fsel option{background:#fff}
#srch{font-size:9.5px;font-family:'DM Mono',monospace;padding:3px 8px;width:120px;border-radius:6px;border:1px solid var(--bdr);background:#fff;color:var(--txt);outline:none}
#srch::placeholder{color:var(--mut)}
#canvas{flex:1;position:relative;overflow:hidden;background:var(--bg);background-image:linear-gradient(rgba(0,0,0,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,.05) 1px,transparent 1px);background-size:40px 40px}
svg{width:100%;height:100%}
#ov{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(255,255,255,.90);backdrop-filter:blur(3px)}
#ov.gone{display:none}
.ring{width:32px;height:32px;border-radius:50%;border:3px solid rgba(0,0,0,.08);border-top-color:#3b82f6;animation:spin .75s linear infinite}
#ovmsg{font-size:12px;color:var(--mut);font-family:'DM Mono',monospace;text-align:center}
#overr{display:none;font-size:11px;color:#dc2626;font-family:'DM Mono',monospace;max-width:400px;text-align:center;line-height:1.7;white-space:pre-wrap}
#ovretry,#ovcache{display:none;font-size:10.5px;font-family:'DM Mono',monospace;padding:5px 14px;border-radius:8px;cursor:pointer;}
#ovretry{background:rgba(59,130,246,.10);border:1px solid rgba(59,130,246,.4);color:#2563eb}
#ovcache{background:rgba(100,116,139,.10);border:1px solid rgba(100,116,139,.4);color:#475569}
#legend{position:absolute;bottom:14px;left:14px;z-index:5;background:rgba(255,255,255,.96);border:1px solid var(--bdr);border-radius:10px;padding:10px 14px;backdrop-filter:blur(8px);max-height:55vh;overflow-y:auto;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.ltit{font-size:8.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin-bottom:7px}
.li{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:10.5px;color:var(--txt);cursor:pointer;transition:opacity .15s}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#legend hr{border:none;border-top:1px solid var(--bdr);margin:7px 0 5px}
.lnote{font-size:9px;color:var(--mut)}
#stats{position:absolute;top:9px;right:14px;z-index:5;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.stat{font-size:9px;font-family:'DM Mono',monospace;padding:2px 7px;border-radius:20px;border:1px solid var(--bdr);color:var(--mut);background:rgba(255,255,255,.92);box-shadow:0 1px 4px rgba(0,0,0,.06)}
#tip{position:absolute;pointer-events:none;z-index:50;background:rgba(255,255,255,.98);border:1px solid var(--bdr);border-radius:10px;padding:10px 13px;max-width:240px;opacity:0;transition:opacity .1s;backdrop-filter:blur(10px);box-shadow:0 4px 16px rgba(0,0,0,.10)}
#tip.show{opacity:1}
#tiptyp{font-size:8.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
#tiplbl{font-size:13px;font-weight:600;color:#0f172a;margin-bottom:4px;line-height:1.35}
.tr{font-size:9.5px;color:#64748b;font-family:'DM Mono',monospace;line-height:1.7}
.tr span{color:var(--txt)}
.node{cursor:grab}.node:active{cursor:grabbing}
.node text{pointer-events:none;user-select:none}
.link{fill:none}
</style>

<script>
const SHEET_ID='1KlBCmI91FuXdNrkK3qXlaEfpEo9MbI8g3bmj80vOD1I';
const csvUrl=s=>`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(s)}`;
const CMAP={'agent':'#0369a1','emulator':'#6d28d9','mcp-server':'#1d4ed8'};
const EXTRA=['#065f46','#92400e','#9f1239','#1e3a5f'];
let sim,nels,lels,cmap={},hidden=new Set(),hgrp='',sq='',frozen=false,GN=[],GL=[];
let radialMode=false;
let floatMode=false;
let radialCentreText='Seller';
const svg=d3.select('#g'),cvs=document.getElementById('canvas'),tip=document.getElementById('tip');
let W=cvs.clientWidth,H=cvs.clientHeight;
const root=svg.append('g'),defs=svg.append('defs');
defs.append('marker').attr('id','ar').attr('markerWidth',6).attr('markerHeight',6).attr('refX',5).attr('refY',2.5).attr('orient','auto').append('path').attr('d','M0,0 L0,5 L6,2.5 z').attr('fill','rgba(100,116,139,0.7)');
const zoom=d3.zoom().scaleExtent([.1,7]).on('zoom',e=>root.attr('transform',e.transform));
svg.call(zoom).on('dblclick.zoom',null);

// Try multiple URL patterns in sequence — first success wins
let _lastFetchMeta = ''; // diagnostic: track which URL succeeded and raw length
async function getCSV(sheetName, gid) {
  const urls = [
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`,
    gid ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}` : null,
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(sheetName)}`,
  ].filter(Boolean);

  let lastErr = null;
  for (let ui=0; ui<urls.length; ui++) {
    const url = urls[ui];
    try {
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const t = await r.text();
      if (t.trimStart().startsWith('<')) throw new Error(`HTML response`);
      const raw = d3.csvParse(t);
      // gviz sometimes mangles column names by merging header + first rows into
      // one line (e.g. "id meta-title meta-subtitle" instead of "id").
      // Fix: take only the first whitespace-delimited token from each column name.
      const colMap = Object.fromEntries(raw.columns.map(c => [c, c.trim().split(/\s+/)[0]]));
      const needsRemap = raw.columns.some(c => colMap[c] !== c);
      const parsed = needsRemap ? raw.map(row => {
        const fixed = {};
        raw.columns.forEach(orig => { fixed[colMap[orig]] = row[orig]; });
        return fixed;
      }) : raw;
      parsed.columns = raw.columns.map(c => colMap[c]);
      _lastFetchMeta += ` | ${sheetName}:url${ui+1},${parsed.length}rows,cols=[${parsed.columns?.join(',')}]${needsRemap?'(FIXED)':''}`;
      return parsed;
    } catch(e) {
      _lastFetchMeta += ` | ${sheetName}:url${ui+1}FAIL(${e.message.slice(0,30)})`;
      lastErr = e;
    }
  }
  throw lastErr;
}

async function load(){
  // Detect file:// — fetch to external URLs always fails due to CORS
  if (location.protocol === 'file:') {
    errOv('This file is open via file://\n\nBrowsers block external requests from local files.\n\nHost it on GitHub Pages, a local server, or any http:// URL — then Sheets will load.');
    document.getElementById('br').classList.remove('spinning');
    return;
  }

  showOv('Fetching from Google Sheets…');
  _lastFetchMeta = '';
  document.getElementById('br').classList.add('spinning');
  try{
    // nodes GID = 0, links GID = 951616868, badges GID = 913249577
    const[nr,lr,br]=await Promise.all([
      getCSV('nodes', '0'),
      getCSV('links', '951616868'),
      getCSV('badges', '913249577').catch(()=>[]),
    ]);
    build(nr,lr,br,'live');
    hideOv();
  }catch(e){
    errOv('Could not load from Google Sheets:\n\n' + e.message + '\n\nCheck the sheet is shared as "Anyone with the link can view" and try ↺ Reload.');
    document.getElementById('br').classList.remove('spinning');
  }finally{document.getElementById('br').classList.remove('spinning');}
}

function build(nodesRaw,linksRaw,badgesRaw,source){
  // Refresh dimensions fresh each time
  W=cvs.clientWidth||window.innerWidth; H=cvs.clientHeight||window.innerHeight;
  // Cancel any running pulse animation from previous build
  if (window._pulseRaf) { cancelAnimationFrame(window._pulseRaf); window._pulseRaf = null; }
  if (window._radialLinkRaf) { cancelAnimationFrame(window._radialLinkRaf); window._radialLinkRaf = null; }
  // Reset radial mode
  radialMode = false;
  floatMode  = false;
  const bview  = document.getElementById('bview');
  const bfloat = document.getElementById('bfloat');
  bview.textContent = '⬡ Radial';
  bview.style.color = '#6366f1';
  bview.style.borderColor = 'rgba(99,102,241,0.5)';
  bview.style.background = 'rgba(255,255,255,0.05)';
  bfloat.textContent = '◌ Float';
  bfloat.style.color = '#14b8a6';
  bfloat.style.borderColor = 'rgba(20,184,166,0.5)';
  bfloat.style.background = 'rgba(255,255,255,0.05)';
  svg.call(zoom.transform, d3.zoomIdentity);
  root.selectAll('*').remove();defs.selectAll('filter').remove();if(sim){sim.stop();sim=null;}
  const meta=Object.fromEntries(nodesRaw.filter(r=>r.type?.trim()==='meta').map(r=>[r.id?.trim(),r]));
  if(meta['meta-title'])document.getElementById('h1').textContent=meta['meta-title'].label||'Agentic LSO Architecture';
  const subtitle=(meta['meta-subtitle']?.label||'')+' · '+source;
  document.getElementById('hsub').textContent=subtitle;
  radialCentreText = meta['meta-radial-centre']?.label || 'Seller';

  const nodes=nodesRaw.filter(r=>r.id?.trim()&&(r.type||'').trim()!=='meta').map(r=>({id:r.id.trim(),label:(r.label||r.id).trim(),type:(r.type||'').trim(),group:(r.group||'').trim(),preH:(r['pre-pos-horiz']||'').trim(),preV:(r['pre-pos-vert']||'').trim(),colorOverride:(r['color']||r['Color']||'').trim(),fontColor:(r['font-color']||r['Font-color']||r['font-Color']||'').trim(),fillColor:(r['fill-color']||r['Fill-color']||r['fill-Color']||'').trim(),sizePct:parseFloat(r['size']||r['Size']||''),shape:(r['shape']||r['Shape']||'circle').trim().toLowerCase()||'circle',animate:(r['animate']||r['Animate']||'').trim().toLowerCase(),animDx:parseFloat(r['animate-dx']||r['Animate-dx']||''),animDy:parseFloat(r['animate-dy']||r['Animate-dy']||''),animDuration:parseFloat(r['animate-duration']||r['Animate-duration']||''),animLoop:parseFloat(r['animate-loop']||r['Animate-loop']||''),radial:(r['radial']||r['Radial']||'').trim().toLowerCase(),radialRing:parseFloat(r['radial-ring']||r['Radial-ring']||''),_raw:r}));

  // Build badge definition map: badge-id → {url, image, label, bg, color}
  const badgeMap={};
  (badgesRaw||[]).forEach(r=>{
    const id=(r.badge||r.Badge||'').trim();
    if(!id)return;

// ── Radial view ──────────────────────────────────────────────────────────────
function enterRadial() {
  if (!GN.length) return;
  radialMode = true;
  const btn = document.getElementById('bview');
  btn.textContent = '⊞ Graph';
  btn.style.color = '#f59e0b';
  btn.style.borderColor = 'rgba(245,158,11,0.5)';
  btn.style.background = 'rgba(245,158,11,0.06)';

  // Stop simulation so forces don't fight the radial positions
  if (sim) sim.stop();

  const cx = W * 0.7, cy = H * 0.7;
  const RING_GAP = 140; // px between rings

  // Group radial nodes by ring number
  const radialNodes = GN.filter(n => n.radial === 'yes' && !isNaN(n.radialRing));
  const rings = {};
  radialNodes.forEach(n => {
    const r = n.radialRing;
    if (!rings[r]) rings[r] = [];
    rings[r].push(n);
  });

  // Compute target positions
  radialNodes.forEach(n => {
    const ring = n.radialRing;
    const peers = rings[ring];
    const idx = peers.indexOf(n);
    if (ring === 0) {
      // Centre node
      n._radX = cx;
      n._radY = cy;
    } else {
      const radius = ring * RING_GAP;
      const angle = (idx / peers.length) * 2 * Math.PI - Math.PI / 2;
      n._radX = cx + radius * Math.cos(angle);
      n._radY = cy + radius * Math.sin(angle);
    }
  });

  // Centre label overlay — white rect with blue border, sits above links
  const CW = 80, CH = 32;
  const centreLabel = root.append('g').attr('class','radial-centre-label')
    .attr('transform',`translate(${cx},${cy})`);
  centreLabel.append('rect')
    .attr('x',-CW/2).attr('y',-CH/2)
    .attr('width',CW).attr('height',CH).attr('rx',6)
    .attr('fill','#ffffff')
    .attr('stroke','#3b82f6').attr('stroke-width',2);
  centreLabel.append('text')
    .attr('text-anchor','middle').attr('dominant-baseline','central')
    .attr('fill','#1e3a5f')
    .style('font-family',"'Sora',sans-serif")
    .style('font-size','13px').style('font-weight','600')
    .text(radialCentreText);
  nels.each(function(d) {
    const el = d3.select(this);
    const inRadial = d.radial === 'yes' && !isNaN(d.radialRing);
    el.transition().duration(600).ease(d3.easeCubicInOut)
      .style('opacity', inRadial ? 1 : 0)
      .style('pointer-events', inRadial ? 'all' : 'none')
      .attr('transform', inRadial
        ? `translate(${d._radX},${d._radY})`
        : `translate(${d.x},${d.y})`
      )
      .on('end', function() {
        if (inRadial) { d.fx = d._radX; d.fy = d._radY; }
      });
  });

  // Fade out links not between two radial nodes, update positions
  const radialIds = new Set(radialNodes.map(n => n.id));
  lels.transition().duration(600)
    .style('opacity', d => {
      const sid = typeof d.source==='object' ? d.source.id : d.source;
      const tid = typeof d.target==='object' ? d.target.id : d.target;
      return radialIds.has(sid) && radialIds.has(tid) ? 1 : 0;
    });
  if (window._llbls) window._llbls.transition().duration(600)
    .style('opacity', d => {
      const sid = typeof d.source==='object' ? d.source.id : d.source;
      const tid = typeof d.target==='object' ? d.target.id : d.target;
      return radialIds.has(sid) && radialIds.has(tid) ? 0.8 : 0;
    });

  // Animate links to follow nodes during transition using a temporary timer
  const t0 = performance.now();
  const DUR = 650;
  function animLinks(ts) {
    const p = Math.min((ts - t0) / DUR, 1);
    const ease = p < 0.5 ? 4*p*p*p : 1 - Math.pow(-2*p+2,3)/2;
    lels.each(function(d) {
      const sn = typeof d.source==='object' ? d.source : GN.find(n=>n.id===d.source);
      const tn = typeof d.target==='object' ? d.target : GN.find(n=>n.id===d.target);
      if (!sn || !tn) return;
      const sx = sn._radX != null ? sn.x + (sn._radX - sn.x)*ease : sn.x;
      const sy = sn._radY != null ? sn.y + (sn._radY - sn.y)*ease : sn.y;
      const tx = tn._radX != null ? tn.x + (tn._radX - tn.x)*ease : tn.x;
      const ty = tn._radY != null ? tn.y + (tn._radY - tn.y)*ease : tn.y;
      const dx=tx-sx, dy=ty-sy, di=Math.sqrt(dx*dx+dy*dy)||1;
      d3.select(this)
        .attr('x1', sx + (dx/di)*(sn.radius+6))
        .attr('y1', sy + (dy/di)*(sn.radius+6))
        .attr('x2', tx - (dx/di)*(tn.radius+6))
        .attr('y2', ty - (dy/di)*(tn.radius+6));
    });
    // Move link labels to midpoint of animated link
    if (window._llbls) window._llbls.each(function(d) {
      const sn = typeof d.source==='object' ? d.source : GN.find(n=>n.id===d.source);
      const tn = typeof d.target==='object' ? d.target : GN.find(n=>n.id===d.target);
      if (!sn || !tn) return;
      const sx = sn._radX != null ? sn.x + (sn._radX - sn.x)*ease : sn.x;
      const sy = sn._radY != null ? sn.y + (sn._radY - sn.y)*ease : sn.y;
      const tx = tn._radX != null ? tn.x + (tn._radX - tn.x)*ease : tn.x;
      const ty = tn._radY != null ? tn.y + (tn._radY - tn.y)*ease : tn.y;
      const dx=tx-sx, dy=ty-sy, di=Math.sqrt(dx*dx+dy*dy)||1;
      d3.select(this)
        .attr('x', (sx+tx)/2)
        .attr('y', (sy+ty)/2 - (dx/di)*9);
    });
    if (p < 1) window._radialLinkRaf = requestAnimationFrame(animLinks);
    else { window._radialLinkRaf = null; setTimeout(fitView, 50); }
  }
  if (window._radialLinkRaf) cancelAnimationFrame(window._radialLinkRaf);
  window._radialLinkRaf = requestAnimationFrame(animLinks);
}

function exitRadial() {
  radialMode = false;
  const btn = document.getElementById('bview');
  btn.textContent = '⬡ Radial';
  btn.style.color = '#6366f1';
  btn.style.borderColor = 'rgba(99,102,241,0.5)';
  btn.style.background = 'rgba(255,255,255,0.05)';

  if (window._radialLinkRaf) { cancelAnimationFrame(window._radialLinkRaf); window._radialLinkRaf = null; }
  root.selectAll('.radial-centre-label').remove();

  // Restore initial fixed positions (pre-pos from sheet), release others
  GN.forEach(n => {
    delete n._radX; delete n._radY;
    const h = parseFloat(n.preH), v = parseFloat(n.preV);
    if (!isNaN(h) && !isNaN(v)) {
      n.fx = W * h; n.fy = H * v;
    } else if (!frozen) {
      n.fx = null; n.fy = null;
    }
  });

  // Restore visibility for all nodes
  nels.transition().duration(400).style('opacity', 1).style('pointer-events', 'all');
  lels.transition().duration(400).style('opacity', 1);
  if (window._llbls) window._llbls.transition().duration(400).style('opacity', 0.8);

  // Restart simulation
  if (sim) sim.alpha(0.4).restart();
  applyVis();
  setTimeout(fitView, 500);
}

document.getElementById('bview').onclick = () => {
  if (floatMode) exitFloat();
  radialMode ? exitRadial() : enterRadial();
};

function enterFloat() {
  if (radialMode) exitRadial();
  floatMode = true;
  const btn = document.getElementById('bfloat');
  btn.textContent = '⊞ Graph';
  btn.style.color = '#14b8a6';
  btn.style.borderColor = 'rgba(20,184,166,0.8)';
  btn.style.background = 'rgba(20,184,166,0.08)';

  // Hide all links and link labels
  lels.transition().duration(400).style('opacity', 0);
  if (window._llbls) window._llbls.transition().duration(400).style('opacity', 0);

  // Pause pulse animation in float mode
  if (window._pulseRaf) { cancelAnimationFrame(window._pulseRaf); window._pulseRaf = null; }

  // Release all fixed positions and reset velocities so nodes don't carry momentum
  GN.forEach(n => { n._savedFx = n.fx; n._savedFy = n.fy; n.fx = null; n.fy = null; n.vx = 0; n.vy = 0; });

  // Compute type centroids — arranged in a circle around canvas centre
  const types = [...new Set(GN.map(n => n.type).filter(Boolean))];
  const cx = W / 2, cy = H / 2;
  const orbitR = Math.min(W, H) * 0.28;
  const typeCentroids = {};
  types.forEach((t, i) => {
    const angle = (i / types.length) * 2 * Math.PI - Math.PI / 2;
    typeCentroids[t] = {
      x: cx + orbitR * Math.cos(angle),
      y: cy + orbitR * Math.sin(angle),
    };
  });

  // Estimate bubble radius from node count per type, with per-type scale multipliers
  const typeCounts = {};
  GN.forEach(n => { typeCounts[n.type] = (typeCounts[n.type]||0) + 1; });

  const BUBBLE_SCALE = { 'mcp-server': 3, 'agent': 2 }; // type-specific multipliers
  const CLUSTER_STRENGTH = { 'agent': 0.22 };            // stronger pull for agents

  // Draw bubble layer — inserted before the node layer
  root.selectAll('.float-bubble-layer').remove();
  const bubbleLayer = root.insert('g', ':first-child').attr('class','float-bubble-layer');

  types.forEach(t => {
    const c  = typeCentroids[t];
    const tc = cmap[t] || '#64748b';
    const scale = BUBBLE_SCALE[t] || 1;
    const bubbleR = Math.max(80, Math.sqrt(typeCounts[t]) * 38) * scale;
    const bg = bubbleLayer.append('g').attr('transform',`translate(${c.x},${c.y})`);
    bg.append('circle')
      .attr('r', bubbleR)
      .attr('fill', tc).attr('fill-opacity', 0.06)
      .attr('stroke', tc).attr('stroke-opacity', 0.25)
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '5,4');
    bg.append('text')
      .attr('text-anchor', 'middle')
      .attr('y', -bubbleR - 8)
      .attr('fill', tc)
      .style('font-family', "'Sora',sans-serif")
      .style('font-size', '11px').style('font-weight', '700')
      .style('letter-spacing', '0.5px').style('text-transform', 'uppercase')
      .text(t);
    // Store radius on centroid for force use
    typeCentroids[t].r = bubbleR;
  });

  // Add type cluster force — pull strength varies by type
  if (sim) {
    sim.force('link', null)
       .force('typeCluster', alpha => {
         GN.forEach(n => {
           const c = typeCentroids[n.type];
           if (!c) return;
           const k = (CLUSTER_STRENGTH[n.type] || 0.12) * alpha;
           n.vx += (c.x - n.x) * k;
           n.vy += (c.y - n.y) * k;
         });
       })
       .alpha(0.8).restart();
  }
}

function exitFloat() {
  floatMode = false;
  const btn = document.getElementById('bfloat');
  btn.textContent = '◌ Float';
  btn.style.color = '#14b8a6';
  btn.style.borderColor = 'rgba(20,184,166,0.5)';
  btn.style.background = 'rgba(255,255,255,0.05)';

  // Remove bubbles
  root.selectAll('.float-bubble-layer').remove();

  // Restore links and labels
  lels.transition().duration(400).style('opacity', 1);
  if (window._llbls) window._llbls.transition().duration(400).style('opacity', 0.8);

  // Restore fixed positions
  GN.forEach(n => {
    const h = parseFloat(n.preH), v = parseFloat(n.preV);
    if (!isNaN(h) && !isNaN(v)) { n.fx = W * h; n.fy = H * v; }
    else if (!frozen) { n.fx = null; n.fy = null; }
    delete n._savedFx; delete n._savedFy;
  });

  // Restore link force, remove cluster force, restart
  if (sim) {
    sim.force('typeCluster', null)
       .force('link', d3.forceLink(GL).id(d=>d.id)
         .distance(d=>{const s=typeof d.source==='object'?d.source:GN.find(n=>n.id===d.source),t=typeof d.target==='object'?d.target:GN.find(n=>n.id===d.target);return s&&t&&s.group&&s.group===t.group?80:150;}).strength(.45))
       .alpha(0.4).restart();
  }
  // Resume pulse animation if one was running before float mode
  if (window._animatePulse && !window._pulseRaf) {
    window._pulseRaf = requestAnimationFrame(window._animatePulse);
  }
  setTimeout(fitView, 500);
}

document.getElementById('bfloat').onclick = () => {
  if (radialMode) exitRadial();
  floatMode ? exitFloat() : enterFloat();
};
